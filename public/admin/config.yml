# Decap CMS configuration for ASEZ website
# Docs: https://decapcms.org/docs/

# Production backend — GitHub OAuth. Phase 2에서 활성화.
backend:
  name: github
  repo: rudcks0121/asez-website
  branch: main

# Local development: `npx decap-server` 실행 후 /admin 접속.
# 이 설정이 true면 production에서도 localhost로 시도하므로
# 배포 사이트에서 사용하려면 false로 바꾸거나 빌드 시 환경별 분기.
local_backend: true

# 이미지 업로드 위치
media_folder: "public/uploads"
public_folder: "/uploads"

# 사이트 표시 이름
site_url: "https://asez-website.rudcks0121.workers.dev"
display_url: "https://asez-website.rudcks0121.workers.dev"

collections:
  # ─────────────────────────────────────────────────────────
  # STORIES — 필드 스토리, 뉴스, 프레스 릴리스
  # 파일: src/content/stories/{slug}.md
  # ─────────────────────────────────────────────────────────
  - name: "stories"
    label: "Stories"
    label_singular: "Story"
    description: "Field stories, news, and press releases."
    folder: "src/content/stories"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date | date('YYYY-MM-DD')}}"
    sortable_fields: ["date", "title", "category"]
    view_filters:
      - label: "Drafts"
        field: draft
        pattern: true
      - label: "Climate action"
        field: category
        pattern: "Climate action"
      - label: "Plastic-free"
        field: category
        pattern: "Plastic-free"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Climate action"
          - "Plastic-free"
          - "Crime prevention"
          - "Digital rights"
          - "Diplomacy"
          - "Recognition"
          - "Community service"
          - "Disaster relief"
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Location", name: "location", widget: "string", required: false, hint: "예: Pretoria, South Africa" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false, hint: "카드/리스트에 표시되는 1-2 문장 요약" }
      - { label: "Cover image URL", name: "image", widget: "string", required: false, hint: "https://... 또는 /uploads/..." }
      - label: "Pill style"
        name: "pillBg"
        widget: "select"
        default: "var(--brand-50)"
        options:
          - { label: "Blue (climate / general)", value: "var(--brand-50)" }
          - { label: "Teal (plastic / nature)", value: "var(--teal-50)" }
          - { label: "Amber (diplomacy / recognition)", value: "var(--amber-50)" }
      - label: "Pill text color"
        name: "pillColor"
        widget: "select"
        default: "var(--brand-900)"
        options:
          - { label: "Blue dark", value: "var(--brand-900)" }
          - { label: "Teal dark", value: "var(--teal-900)" }
          - { label: "Amber dark", value: "var(--amber-900)" }
      - { label: "Draft (not published)", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ─────────────────────────────────────────────────────────
  # REPORTS — 연간 보고서 / SDG / 리서치 / 정책 페이퍼
  # 파일: src/content/reports/{slug}.md
  # ─────────────────────────────────────────────────────────
  - name: "reports"
    label: "Reports"
    label_singular: "Report"
    description: "Annual reports, SDG progress, research briefs, and policy papers."
    folder: "src/content/reports"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date | date('YYYY-MM')}} · {{pages}}p"
    sortable_fields: ["date", "title", "type"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - "Annual report"
          - "SDG progress"
          - "Research brief"
          - "Policy paper"
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Pages", name: "pages", widget: "number", value_type: "int", min: 1 }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "1-2 문장 요약" }
      - { label: "PDF URL", name: "pdfUrl", widget: "string", default: "#", hint: "PDF 파일 링크 (없으면 #)" }
      - label: "Pill background"
        name: "pillBg"
        widget: "select"
        default: "var(--brand-50)"
        options:
          - { label: "Blue", value: "var(--brand-50)" }
          - { label: "Teal", value: "var(--teal-50)" }
          - { label: "Amber", value: "var(--amber-50)" }
      - label: "Pill text color"
        name: "pillColor"
        widget: "select"
        default: "var(--brand-900)"
        options:
          - { label: "Blue dark", value: "var(--brand-900)" }
          - { label: "Teal dark", value: "var(--teal-900)" }
          - { label: "Amber dark", value: "var(--amber-900)" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body (optional)", name: "body", widget: "markdown", required: false }

  # ─────────────────────────────────────────────────────────
  # EVENTS — 다가오는 / 지난 행사
  # 파일: src/content/events/{slug}.md
  # ─────────────────────────────────────────────────────────
  - name: "events"
    label: "Events"
    label_singular: "Event"
    description: "Upcoming and past forums, summits, campaigns, conferences."
    folder: "src/content/events"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date | date('YYYY-MM-DD')}} · {{location}}"
    sortable_fields: ["date", "title", "type"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["Forum", "Summit", "Campaign", "Conference", "Workshop"]
      - { label: "Date (start)", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "End date (optional, for multi-day events)", name: "endDate", widget: "datetime", required: false, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Location", name: "location", widget: "string", hint: "예: Seoul, South Korea / Worldwide" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Registration URL", name: "registrationUrl", widget: "string", default: "#" }
      - label: "Pill background"
        name: "pillBg"
        widget: "select"
        default: "var(--brand-50)"
        options:
          - { label: "Blue", value: "var(--brand-50)" }
          - { label: "Teal", value: "var(--teal-50)" }
          - { label: "Amber", value: "var(--amber-50)" }
      - label: "Pill text color"
        name: "pillColor"
        widget: "select"
        default: "var(--brand-900)"
        options:
          - { label: "Blue dark", value: "var(--brand-900)" }
          - { label: "Teal dark", value: "var(--teal-900)" }
          - { label: "Amber dark", value: "var(--amber-900)" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
